---
# 02a-setup-haproxy.yml - Configure pfSense HAProxy for OKD VIPs
#
# Uses pfsensible.core collection to configure HAProxy on pfSense.
# Creates VIPs, backends, servers, and frontends for OKD load balancing.
#
# Prerequisites:
#   - pfSense with HAProxy package installed
#   - SSH access to pfSense with Python 3.11
#   - Node IPs known (passed via backend_ips variable)
#
# Usage:
#   ansible-playbook playbooks/02a-setup-haproxy.yml -e @vars/okd-agent.yml \
#     -e 'backend_ips=["10.10.2.100","10.10.2.101","10.10.2.102"]'
#
# =============================================================================

- name: Configure pfSense HAProxy for OKD
  hosts: pfsense
  gather_facts: false
  vars:
    # Derive backend_ips from master_nodes if not explicitly provided
    backend_ips: "{{ master_nodes | map(attribute='ip') | list if master_nodes is defined else [] }}"
    ingress_ips: "{{ ingress_backend_ips | default(backend_ips) }}"
    pfsense_vip_interface: "opt1"  # MGMT_DEVOPS interface

  tasks:
    - name: Validate backend IPs available
      ansible.builtin.fail:
        msg: "backend_ips must be provided. Either define master_nodes in vars or pass -e 'backend_ips=[\"10.10.2.100\"]'"
      when: backend_ips | length == 0
      delegate_to: localhost

    - name: Display HAProxy configuration plan
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "Configuring pfSense HAProxy for OKD"
          - "=============================================="
          - "API VIP: {{ api_vip }}:6443"
          - "Ingress VIP: {{ ingress_vip }}:443"
          - "Backend IPs: {{ backend_ips }}"
          - "=============================================="
      delegate_to: localhost

    # =========================================================================
    # UPLOAD PHP SCRIPTS
    # =========================================================================
    - name: Upload HAProxy configuration scripts
      ansible.builtin.copy:
        src: "{{ item }}"
        dest: "/tmp/{{ item | basename }}"
        mode: '0755'
      loop:
        - "{{ playbook_dir }}/../scripts/create-vips.php"
        - "{{ playbook_dir }}/../scripts/create-haproxy-frontends.php"

    # =========================================================================
    # CREATE VIRTUAL IPS
    # =========================================================================
    - name: Create Virtual IPs for OKD
      pfsensible.core.pfsense_phpshell:
        cmd: |
          require_once("config.inc");
          require_once("util.inc");
          require_once("interfaces.inc");

          global $config;

          $api_vip = '{{ api_vip }}';
          $ingress_vip = '{{ ingress_vip }}';
          $interface = '{{ pfsense_vip_interface }}';

          echo "Creating Virtual IPs for OKD\n";

          if (!isset($config['virtualip'])) {
              $config['virtualip'] = array();
          }
          if (!isset($config['virtualip']['vip']) || !is_array($config['virtualip']['vip'])) {
              $config['virtualip']['vip'] = array();
          }

          $vips = array(
              array('descr' => 'OKD API VIP', 'subnet' => $api_vip),
              array('descr' => 'OKD Ingress VIP', 'subnet' => $ingress_vip)
          );

          $max_uniqid = 0;
          foreach ($config['virtualip']['vip'] as $vip) {
              if (isset($vip['uniqid'])) {
                  $id = intval(str_replace('vip', '', $vip['uniqid']));
                  if ($id > $max_uniqid) $max_uniqid = $id;
              }
          }

          foreach ($vips as $vip_def) {
              $found = false;
              foreach ($config['virtualip']['vip'] as $idx => $existing) {
                  if (isset($existing['subnet']) && $existing['subnet'] == $vip_def['subnet']) {
                      echo "VIP exists: {$vip_def['subnet']}\n";
                      $found = true;
                      break;
                  }
              }
              if (!$found) {
                  $max_uniqid++;
                  echo "Creating VIP: {$vip_def['subnet']}\n";
                  $config['virtualip']['vip'][] = array(
                      'uniqid' => 'vip' . $max_uniqid,
                      'descr' => $vip_def['descr'],
                      'type' => 'single',
                      'subnet_bits' => '32',
                      'subnet' => $vip_def['subnet'],
                      'interface' => $interface,
                      'mode' => 'ipalias'
                  );
              }
          }

          write_config("OKD Virtual IPs configured via Ansible");

          foreach ($config['virtualip']['vip'] as $vip) {
              if (isset($vip['subnet']) && ($vip['subnet'] == $api_vip || $vip['subnet'] == $ingress_vip)) {
                  interface_ipalias_configure($vip);
              }
          }

          sleep(1);
          $ifconfig = shell_exec("ifconfig -a | grep -E '$api_vip|$ingress_vip'");
          if (!empty(trim($ifconfig))) {
              echo "OK: VIPs are active\n";
          } else {
              shell_exec("ifconfig vtnet1 alias $api_vip/32");
              shell_exec("ifconfig vtnet1 alias $ingress_vip/32");
              echo "OK: VIPs applied via ifconfig\n";
          }
      register: vip_result
      changed_when: "'Creating VIP' in (vip_result.stdout | default(''))"
      failed_when: (vip_result.rc | default(0)) != 0

    - name: Display VIP result
      ansible.builtin.debug:
        msg: "{{ vip_result.stdout_lines | default(['VIPs configured']) }}"

    # =========================================================================
    # CREATE BACKENDS (via pfsensible modules)
    # =========================================================================
    - name: Create OKD API backend
      pfsensible.core.pfsense_haproxy_backend:
        name: okd-api-backend
        balance: roundrobin
        check_type: Basic
        check_frequency: 5000
        connection_timeout: 5000
        server_timeout: 50000
        state: present

    - name: Create OKD Machine Config backend
      pfsensible.core.pfsense_haproxy_backend:
        name: okd-mcs-backend
        balance: roundrobin
        check_type: Basic
        check_frequency: 5000
        connection_timeout: 5000
        server_timeout: 50000
        state: present

    - name: Create OKD HTTP Ingress backend
      pfsensible.core.pfsense_haproxy_backend:
        name: okd-http-backend
        balance: roundrobin
        check_type: Basic
        check_frequency: 5000
        connection_timeout: 5000
        server_timeout: 50000
        state: present

    - name: Create OKD HTTPS Ingress backend
      pfsensible.core.pfsense_haproxy_backend:
        name: okd-https-backend
        balance: roundrobin
        check_type: Basic
        check_frequency: 5000
        connection_timeout: 5000
        server_timeout: 50000
        state: present

    # =========================================================================
    # ADD BACKEND SERVERS
    # =========================================================================
    - name: Add API backend servers
      pfsensible.core.pfsense_haproxy_backend_server:
        backend: okd-api-backend
        name: "master-{{ idx }}"
        address: "{{ item }}"
        port: 6443
        state: present
      loop: "{{ backend_ips }}"
      loop_control:
        index_var: idx

    - name: Add Machine Config backend servers
      pfsensible.core.pfsense_haproxy_backend_server:
        backend: okd-mcs-backend
        name: "master-{{ idx }}"
        address: "{{ item }}"
        port: 22623
        state: present
      loop: "{{ backend_ips }}"
      loop_control:
        index_var: idx

    - name: Add HTTP Ingress backend servers
      pfsensible.core.pfsense_haproxy_backend_server:
        backend: okd-http-backend
        name: "ingress-{{ idx }}"
        address: "{{ item }}"
        port: 80
        state: present
      loop: "{{ ingress_ips }}"
      loop_control:
        index_var: idx

    - name: Add HTTPS Ingress backend servers
      pfsensible.core.pfsense_haproxy_backend_server:
        backend: okd-https-backend
        name: "ingress-{{ idx }}"
        address: "{{ item }}"
        port: 443
        state: present
      loop: "{{ ingress_ips }}"
      loop_control:
        index_var: idx

    # =========================================================================
    # CREATE FRONTENDS (via PHP script - pfsensible has no frontend module)
    # =========================================================================
    - name: Configure HAProxy frontends
      pfsensible.core.pfsense_phpshell:
        cmd: |
          require_once("config.inc");
          require_once("util.inc");
          require_once("haproxy/haproxy.inc");

          global $config;

          $api_vip = '{{ api_vip }}';
          $ingress_vip = '{{ ingress_vip }}';

          echo "Creating HAProxy frontends for OKD\n";

          if (!isset($config['installedpackages']['haproxy']['ha_backends']) ||
              !is_array($config['installedpackages']['haproxy']['ha_backends'])) {
              $config['installedpackages']['haproxy']['ha_backends'] = array();
          }
          if (!isset($config['installedpackages']['haproxy']['ha_backends']['item']) ||
              !is_array($config['installedpackages']['haproxy']['ha_backends']['item'])) {
              $config['installedpackages']['haproxy']['ha_backends']['item'] = array();
          }

          $backend_names = array();
          if (isset($config['installedpackages']['haproxy']['ha_pools']['item']) &&
              is_array($config['installedpackages']['haproxy']['ha_pools']['item'])) {
              foreach ($config['installedpackages']['haproxy']['ha_pools']['item'] as $pool) {
                  if (isset($pool['name'])) {
                      $backend_names[] = $pool['name'];
                  }
              }
          }

          $frontends = array(
              array('name' => 'okd-api-frontend', 'desc' => 'OKD API', 'type' => 'tcp',
                    'ip' => $api_vip, 'port' => '6443', 'backend' => 'okd-api-backend'),
              array('name' => 'okd-mcs-frontend', 'desc' => 'OKD Machine Config', 'type' => 'tcp',
                    'ip' => $api_vip, 'port' => '22623', 'backend' => 'okd-mcs-backend'),
              array('name' => 'okd-http-frontend', 'desc' => 'OKD HTTP Ingress', 'type' => 'tcp',
                    'ip' => $ingress_vip, 'port' => '80', 'backend' => 'okd-http-backend'),
              array('name' => 'okd-https-frontend', 'desc' => 'OKD HTTPS Ingress', 'type' => 'tcp',
                    'ip' => $ingress_vip, 'port' => '443', 'backend' => 'okd-https-backend')
          );

          $max_id = 199;
          foreach ($config['installedpackages']['haproxy']['ha_backends']['item'] as $fe) {
              if (isset($fe['id']) && intval($fe['id']) > $max_id) $max_id = intval($fe['id']);
          }
          if (isset($config['installedpackages']['haproxy']['ha_pools']['item'])) {
              foreach ($config['installedpackages']['haproxy']['ha_pools']['item'] as $be) {
                  if (isset($be['id']) && intval($be['id']) > $max_id) $max_id = intval($be['id']);
              }
          }

          $new_items = array();
          foreach ($config['installedpackages']['haproxy']['ha_backends']['item'] as $existing) {
              if (isset($existing['name']) && strpos($existing['name'], 'okd-') === 0) continue;
              $new_items[] = $existing;
          }
          $config['installedpackages']['haproxy']['ha_backends']['item'] = $new_items;

          foreach ($frontends as $frontend) {
              if (!in_array($frontend['backend'], $backend_names)) continue;
              $max_id++;
              echo "Creating frontend: {$frontend['name']} -> {$frontend['ip']}:{$frontend['port']}\n";
              $config['installedpackages']['haproxy']['ha_backends']['item'][] = array(
                  'id' => strval($max_id),
                  'name' => $frontend['name'],
                  'desc' => $frontend['desc'],
                  'status' => 'active',
                  'type' => $frontend['type'],
                  'backend_serverpool' => $frontend['backend'],
                  'a_extaddr' => array(
                      'item' => array(
                          array(
                              'extaddr' => 'custom',
                              'extaddr_custom' => $frontend['ip'],
                              'extaddr_port' => $frontend['port']
                          )
                      )
                  )
              );
          }

          write_config("OKD HAProxy frontends configured via Ansible");
          $savemsg = '';
          haproxy_check_and_run($savemsg, true);

          $running = shell_exec("pgrep haproxy");
          if (!empty(trim($running))) {
              echo "OK: HAProxy is running (PID: " . trim($running) . ")\n";
          } else {
              echo "ERROR: HAProxy failed to start\n";
          }
      register: frontend_result
      changed_when: "'Creating frontend' in (frontend_result.stdout | default(''))"
      failed_when: (frontend_result.rc | default(0)) != 0

    - name: Display frontend configuration result
      ansible.builtin.debug:
        msg: "{{ frontend_result.stdout_lines | default(['Frontends configured']) }}"

    # =========================================================================
    # RESTART HAPROXY AND VERIFY
    # =========================================================================
    - name: Restart HAProxy service
      ansible.builtin.raw: /usr/local/sbin/pfSsh.php playback svc restart haproxy
      register: haproxy_restart
      changed_when: true

    - name: Wait for HAProxy to start
      ansible.builtin.pause:
        seconds: 5

    - name: Ensure VIPs are applied to interface
      pfsensible.core.pfsense_phpshell:
        cmd: |
          require_once("config.inc");
          require_once("interfaces.inc");

          global $config;

          $api_vip = '{{ api_vip }}';
          $ingress_vip = '{{ ingress_vip }}';
          $interface = '{{ pfsense_vip_interface }}';

          // Get the real interface name (e.g., vtnet1 for opt1)
          $real_if = get_real_interface($interface);
          if (empty($real_if)) {
              $real_if = 'vtnet1';  // fallback
          }

          // Check if VIPs are active
          $ifconfig = shell_exec("ifconfig -a");
          $api_active = strpos($ifconfig, $api_vip) !== false;
          $ingress_active = strpos($ifconfig, $ingress_vip) !== false;

          if (!$api_active) {
              shell_exec("ifconfig $real_if alias $api_vip/32");
              echo "Applied API VIP: $api_vip to $real_if\n";
          } else {
              echo "API VIP already active: $api_vip\n";
          }

          if (!$ingress_active) {
              shell_exec("ifconfig $real_if alias $ingress_vip/32");
              echo "Applied Ingress VIP: $ingress_vip to $real_if\n";
          } else {
              echo "Ingress VIP already active: $ingress_vip\n";
          }

          // Verify final state
          $ifconfig = shell_exec("ifconfig $real_if | grep inet");
          echo "Interface IPs:\n$ifconfig";
      register: vip_apply_result
      changed_when: "'Applied' in (vip_apply_result.stdout | default(''))"

    - name: Display VIP application result
      ansible.builtin.debug:
        msg: "{{ vip_apply_result.stdout_lines | default(['VIPs verified']) }}"

    - name: Verify HAProxy is listening on VIPs
      ansible.builtin.raw: |
        php -r '
        $api_vip = "{{ api_vip }}";
        $ingress_vip = "{{ ingress_vip }}";

        $sockstat = shell_exec("sockstat -l -4");
        $haproxy_sockets = shell_exec("sockstat -l | grep haproxy");

        $config_file = "/var/etc/haproxy/haproxy.cfg";
        if (file_exists($config_file)) {
            $content = file_get_contents($config_file);
            $frontends = preg_match_all("/^frontend /m", $content);
            $backends = preg_match_all("/^backend /m", $content);
            echo "HAProxy config: $frontends frontends, $backends backends\n";
        }

        $running = shell_exec("pgrep haproxy");
        if (!empty(trim($running))) {
            echo "OK: HAProxy running (PID: " . trim($running) . ")\n";
        } else {
            echo "ERROR: HAProxy not running\n";
        }

        echo "HAProxy listening sockets:\n$haproxy_sockets";
        echo "DONE\n";
        ' 2>&1
      register: haproxy_verify
      changed_when: false
      failed_when: "'DONE' not in (haproxy_verify.stdout | default(''))"

    - name: Display HAProxy verification
      ansible.builtin.debug:
        msg: "{{ haproxy_verify.stdout_lines | default(['HAProxy verified']) }}"

    - name: Display completion message
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "HAProxy Configuration Complete"
          - "=============================================="
          - "API VIP: {{ api_vip }}:6443"
          - "Machine Config VIP: {{ api_vip }}:22623"
          - "Ingress HTTP VIP: {{ ingress_vip }}:80"
          - "Ingress HTTPS VIP: {{ ingress_vip }}:443"
          - ""
          - "Backends configured with servers:"
          - "{% for ip in backend_ips %}  - {{ ip }}{% endfor %}"
          - "=============================================="
      delegate_to: localhost
