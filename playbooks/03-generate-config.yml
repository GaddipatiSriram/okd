---
# 03-generate-config.yml - Generate install-config.yaml for OKD IPI
#
# This playbook:
#   1. Reads SSH public key and pull secret
#   2. Generates install-config.yaml from template
#   3. Creates a backup (installer consumes the original)
#
# Usage:
#   ansible-playbook playbooks/03-generate-config.yml -e @vars/okd-ipi.yml

- name: Generate OKD install-config.yaml
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - ../vars/okd-ipi.yml
    - ../vars/ovirt-ids.yml

  tasks:
    - name: Ensure install directory exists
      ansible.builtin.file:
        path: "{{ okd_install_dir }}"
        state: directory
        mode: '0755'

    - name: Read SSH public key
      ansible.builtin.slurp:
        src: "{{ ssh_public_key_file }}"
      register: ssh_key_content

    - name: Set SSH public key fact
      ansible.builtin.set_fact:
        ssh_public_key: "{{ ssh_key_content.content | b64decode | trim }}"

    - name: Read pull secret
      ansible.builtin.slurp:
        src: "{{ pull_secret_file }}"
      register: pull_secret_content

    - name: Set pull secret fact
      ansible.builtin.set_fact:
        pull_secret: "{{ pull_secret_content.content | b64decode | trim }}"

    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "Generating install-config.yaml"
          - "=============================================="
          - "Cluster: {{ cluster_name }}.{{ base_domain }}"
          - "Control Plane: {{ control_plane_replicas }} nodes"
          - "Compute: {{ compute_replicas }} nodes"
          - ""
          - "oVirt Configuration:"
          - "  Cluster ID: {{ ovirt_cluster_id }}"
          - "  Storage Domain ID: {{ ovirt_storage_domain_id }}"
          - "  vNIC Profile ID: {{ vnic_profile_id }}"
          - "  Network: {{ ovirt_network_name }}"
          - ""
          - "Network:"
          - "  API VIP: {{ api_vip }}"
          - "  Ingress VIP: {{ ingress_vip }}"
          - "  Machine Network: {{ machine_network_cidr }}"
          - "=============================================="

    - name: Generate install-config.yaml from template
      ansible.builtin.template:
        src: "../templates/install-config.yaml.j2"
        dest: "{{ okd_install_dir }}/install-config.yaml"
        mode: '0600'

    - name: Create backup of install-config.yaml
      ansible.builtin.copy:
        src: "{{ okd_install_dir }}/install-config.yaml"
        dest: "{{ okd_install_dir }}/install-config.yaml.backup"
        mode: '0600'
        remote_src: true

    - name: Display completion message
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "install-config.yaml Generated!"
          - "=============================================="
          - "Location: {{ okd_install_dir }}/install-config.yaml"
          - "Backup: {{ okd_install_dir }}/install-config.yaml.backup"
          - ""
          - "Next step: Run 04-install-okd.yml to start installation"
          - "=============================================="
