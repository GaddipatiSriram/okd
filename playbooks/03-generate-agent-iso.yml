---
# 03-generate-agent-iso.yml - Generate Agent-based Installer ISO
#
# This playbook generates the bootable agent ISO that VMs will boot from.
# The ISO contains everything needed to install OKD without external dependencies.
#
# Prerequisites:
#   - openshift-install 4.16+ binary available
#   - DNS records configured
#   - pull-secret.json configured
#
# Usage:
#   ansible-playbook playbooks/03-generate-agent-iso.yml -e @vars/okd-agent.yml
#
# =============================================================================

- name: Generate OKD Agent ISO
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Ensure install directory exists
      ansible.builtin.file:
        path: "{{ okd_install_dir }}"
        state: directory
        mode: '0755'

    - name: Read SSH public key
      ansible.builtin.slurp:
        src: "{{ ssh_public_key_file }}"
      register: ssh_key_content

    - name: Set SSH public key fact
      ansible.builtin.set_fact:
        ssh_public_key: "{{ ssh_key_content.content | b64decode | trim }}"

    - name: Read pull secret
      ansible.builtin.slurp:
        src: "{{ pull_secret_file }}"
      register: pull_secret_content

    - name: Set pull secret fact
      ansible.builtin.set_fact:
        pull_secret: "{{ pull_secret_content.content | b64decode | trim }}"

    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "Generating Agent ISO"
          - "=============================================="
          - "Cluster: {{ cluster_name }}.{{ base_domain }}"
          - "OKD Version: {{ okd_version }}"
          - "Control Plane: {{ control_plane_replicas }} node(s)"
          - "Compute: {{ compute_replicas }} node(s)"
          - ""
          - "Network:"
          - "  Machine Network: {{ machine_network_cidr }}"
          - "  API VIP: {{ api_vip }}"
          - "  Ingress VIP: {{ ingress_vip }}"
          - ""
          - "{{ 'RHCOS Override: ' + rhcos_live_iso_url if rhcos_live_iso_url is defined else 'Using default SCOS ISO' }}"
          - "=============================================="

    - name: Generate install-config.yaml
      ansible.builtin.template:
        src: ../templates/install-config-agent.yaml.j2
        dest: "{{ okd_install_dir }}/install-config.yaml"
        mode: '0644'

    - name: Generate agent-config.yaml
      ansible.builtin.template:
        src: ../templates/agent-config.yaml.j2
        dest: "{{ okd_install_dir }}/agent-config.yaml"
        mode: '0644'

    - name: Backup configuration files
      ansible.builtin.copy:
        src: "{{ okd_install_dir }}/{{ item }}"
        dest: "{{ okd_install_dir }}/{{ item }}.backup"
        mode: '0644'
        remote_src: true
      loop:
        - install-config.yaml
        - agent-config.yaml

    - name: Display install-config.yaml
      ansible.builtin.command:
        cmd: "cat {{ okd_install_dir }}/install-config.yaml"
      register: install_config_display
      changed_when: false

    - name: Show install-config content
      ansible.builtin.debug:
        msg: "{{ install_config_display.stdout_lines }}"

    - name: Generate agent ISO
      ansible.builtin.command:
        cmd: >
          {{ openshift_install_binary }} agent create image
          --dir={{ okd_install_dir }}
          --log-level=debug
      environment:
        OPENSHIFT_INSTALL_RELEASE_IMAGE_OVERRIDE: "{{ okd_release_image }}"
        OPENSHIFT_INSTALL_OS_IMAGE_OVERRIDE: "{{ rhcos_live_iso_url | default(omit) }}"
      register: iso_generation
      changed_when: true

    - name: Display ISO generation output
      ansible.builtin.debug:
        msg: "{{ iso_generation.stderr_lines | default(iso_generation.stdout_lines) }}"

    - name: Check ISO was created
      ansible.builtin.stat:
        path: "{{ okd_install_dir }}/{{ agent_iso_name }}"
      register: iso_stat

    - name: Fail if ISO not created
      ansible.builtin.fail:
        msg: "Agent ISO was not created. Check the output above for errors."
      when: not iso_stat.stat.exists

    - name: Get ISO size
      ansible.builtin.set_fact:
        iso_size_mb: "{{ (iso_stat.stat.size / 1024 / 1024) | round(2) }}"

    - name: Display completion message
      ansible.builtin.debug:
        msg:
          - "=============================================="
          - "Agent ISO Generated Successfully!"
          - "=============================================="
          - "ISO Path: {{ okd_install_dir }}/{{ agent_iso_name }}"
          - "ISO Size: {{ iso_size_mb }} MB"
          - ""
          - "Backup files:"
          - "  {{ okd_install_dir }}/install-config.yaml.backup"
          - "  {{ okd_install_dir }}/agent-config.yaml.backup"
          - ""
          - "Next step: Run 04-deploy-vms.yml to create VMs"
          - "=============================================="
